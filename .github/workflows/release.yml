name: Create Release

on:
  push:
    branches: [ main, master ]
    paths:
      - 'VERSION.txt'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Read version
      id: version
      run: |
        VERSION=$(cat VERSION.txt)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Check if tag exists
      id: check_tag
      run: |
        if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create and push tag
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
        git push origin "v${{ steps.version.outputs.version }}"

    - name: Create ZIP file
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        zip -r "Autodesk-Deployment-v${{ steps.version.outputs.version }}.zip" . \
          -x "*.git*" "*.github*" "*.vscode*" "*.DS_Store*" "*Thumbs.db*" \
             ".gitignore" "CHANGELOG.md" "Manage-Version.ps1" "README.md" "VERSION.txt" ".*"

    - name: Generate release notes
      if: steps.check_tag.outputs.exists == 'false'
      id: release_notes
      run: |
        # Get the last tag (previous version)
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

        if [ -n "$LAST_TAG" ]; then
          echo "## Changes since $LAST_TAG" > release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD >> release_notes.md
        else
          echo "## Initial Release" > release_notes.md
          echo "" >> release_notes.md
          echo "First release of the Autodesk Deployment scripts." >> release_notes.md
        fi

        echo "" >> release_notes.md
        echo "## Files included:" >> release_notes.md
        echo "- Install-ADSK.ps1 - Main installation script" >> release_notes.md
        echo "- Copy-Local.ps1 - Local file copy script" >> release_notes.md
        echo "- Uninstall.ps1 - Uninstallation script" >> release_notes.md
        echo "- samples/ - Sample batch files" >> release_notes.md

    - name: Create GitHub Release
      if: steps.check_tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ steps.version.outputs.version }}"
        name: "Autodesk Deployment Tools v${{ steps.version.outputs.version }}"
        body_path: release_notes.md
        files: |
          Autodesk-Deployment-v${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
